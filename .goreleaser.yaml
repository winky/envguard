version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: envguard
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "envguard-{{ .Os }}-{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^Merge"

brews:
  - name: envguard
    repository:
      owner: winky
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/winky/envguard"
    description: "Detect exposed secrets and credentials before they reach AI tools"
    license: "MIT"
    install: |
      bin.install "envguard"
    test: |
      system "#{bin}/envguard", "--version"
